services:
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    environment:
      BACKEND_HOST_MAIN: ${BACKEND_HOST_MAIN:-mysawit-be-main}
      BACKEND_HOST_STAGING: ${BACKEND_HOST_STAGING:-mysawit-be-staging}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s|\$${BACKEND_HOST_MAIN}|$$BACKEND_HOST_MAIN|g" \
          -e "s|\$${BACKEND_HOST_STAGING}|$$BACKEND_HOST_STAGING|g" \
          /etc/observability/prometheus.yml > /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle
    volumes:
      - .:/etc/observability:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  alertmanager:
    image: prom/alertmanager:v0.27.0
    restart: unless-stopped
    environment:
      DISCORD_WEBHOOK_URL_CRITICAL: ${DISCORD_WEBHOOK_URL_CRITICAL:-}
      DISCORD_WEBHOOK_URL_WARNING: ${DISCORD_WEBHOOK_URL_WARNING:-}
    entrypoint:
      - /bin/sh
      - -c
      - |
        if [ -n "$$DISCORD_WEBHOOK_URL_CRITICAL" ]; then
          sed \
            -e "s|\$${DISCORD_WEBHOOK_URL_CRITICAL}|$$DISCORD_WEBHOOK_URL_CRITICAL|g" \
            -e "s|\$${DISCORD_WEBHOOK_URL_WARNING}|$$DISCORD_WEBHOOK_URL_WARNING|g" \
            /etc/observability/alertmanager.yml > /tmp/alertmanager.yml
        else
          printf 'route:\n  receiver: blackhole\nreceivers:\n  - name: blackhole\n' > /tmp/alertmanager.yml
        fi
        exec /bin/alertmanager \
          --config.file=/tmp/alertmanager.yml \
          --storage.path=/alertmanager \
          --web.listen-address=0.0.0.0:9093
    volumes:
      - .:/etc/observability:ro
      - alertmanager_data:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9093/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      prometheus:
        condition: service_healthy

  loki:
    image: grafana/loki:3.3.0
    restart: unless-stopped
    user: "0:0"
    command: -config.file=/etc/observability/loki/loki-config.yaml
    volumes:
      - .:/etc/observability:ro
      - loki_storage:/loki
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  alloy:
    image: grafana/alloy:v1.5.0
    restart: unless-stopped
    command: run --server.http.listen-addr=0.0.0.0:12345 /etc/observability/alloy/config.alloy
    volumes:
      - .:/etc/observability:ro
      - /var/log/mysawit:/var/log/mysawit:ro
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - .:/etc/observability:ro
    entrypoint:
      - /bin/sh
      - -c
      - |
        ln -sf /etc/observability/provisioning /etc/grafana/provisioning
        exec /run.sh
    ports:
      - "3000"
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
  loki_storage:
