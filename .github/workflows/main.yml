name: CI + CD

on:
  push:
  pull_request:

permissions:
  contents: read
  packages: write
  actions: read
  checks: read
  pull-requests: read
  statuses: read
  security-events: read
  id-token: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  cd:
    needs: ci
    if: github.event_name == 'push'
    uses: ./.github/workflows/cd.yml
    secrets: inherit
