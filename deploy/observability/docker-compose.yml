services:
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    environment:
      BACKEND_HOST_MAIN: ${BACKEND_HOST_MAIN:-mysawit-be-main}
      BACKEND_HOST_STAGING: ${BACKEND_HOST_STAGING:-mysawit-be-staging}
    entrypoint:
      - /bin/sh
      - -c
      - |
        sed \
          -e "s/BACKEND_HOST_MAIN_PLACEHOLDER/$${BACKEND_HOST_MAIN}/g" \
          -e "s/BACKEND_HOST_STAGING_PLACEHOLDER/$${BACKEND_HOST_STAGING}/g" \
          /etc/prometheus/prometheus.yml.tmpl > /tmp/prometheus.yml
        echo "=== Config ===" && cat /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml.tmpl:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── alertmanager disabled until Discord webhooks configured ───────────────
  #  alertmanager:
  #    ...

  # ── loki + alloy disabled until bind mount issue resolved ─────────────────
  #  loki:
  #    ...
  #  alloy:
  #    ...

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000"
    networks:
      - coolify
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:

networks:
  coolify:
    external: true
