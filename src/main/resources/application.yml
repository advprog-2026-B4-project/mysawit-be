api:
  kebun:
    path: /api/kebun

app:
  midtrans:
    server-key: ${MIDTRANS_SERVER_KEY:}
    client-key: ${MIDTRANS_CLIENT_KEY:}
    merchant-id: ${MIDTRANS_MERCHANT_ID:}
    snap-base-url: ${MIDTRANS_SNAP_BASE_URL:https://app.sandbox.midtrans.com/snap/v1}
    notification-url: ${MIDTRANS_NOTIFICATION_URL:http://localhost:8080/api/pembayaran/wallet/midtrans-callback}
    redirect-url: ${APP_FRONTEND_URL:http://localhost:3000}/admin/pembayaran/topup/status
    connect-timeout-ms: ${MIDTRANS_CONNECT_TIMEOUT_MS:5000}
    read-timeout-ms: ${MIDTRANS_READ_TIMEOUT_MS:10000}
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
  name: MySawit
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  google:
    client-id: ${GOOGLE_CLIENT_ID:placeholder-client-id}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/auth/oauth2/callback}
  frontend:
    url: ${APP_FRONTEND_URL:http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-min-256-bits}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  storage:
    r2:
      endpoint: ${R2_ENDPOINT:https://<account-id>.r2.cloudflarestorage.com}
      bucket: ${R2_BUCKET:mysawit-bucket}
      access-key: ${R2_ACCESS_KEY:placeholder}
      secret-key: ${R2_SECRET_KEY:placeholder}
      public-url: ${R2_PUBLIC_URL:https://pub-<hash>.r2.dev}

spring:
  config:
    import: optional:file:.env
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mysawit}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:20}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: 10000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
        #     scope:
        #       - email
        #       - profile
        #     redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        # provider:
        #   google:
        #     authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
        #     token-uri: https://oauth2.googleapis.com/token
        #     user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
  tomcat:
    threads:
      max: ${TOMCAT_THREADS_MAX:100}
      min-spare: ${TOMCAT_THREADS_MIN:10}
    accept-count: 50

management:
  server:
    port: ${MANAGEMENT_PORT:9090}
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  metrics:
    tags:
      application: mysawit-be
    distribution:
      percentiles-histogram:
        panen.create.duration: true
        panen.approve.duration: true
        http.server.requests: true
      percentiles:
        panen.create.duration: 0.5,0.95,0.99
        panen.approve.duration: 0.5,0.95,0.99
        http.server.requests: 0.5,0.95,0.99
      slo:
        panen.create.duration: 300ms
        panen.approve.duration: 300ms

logging:
  level:
    id.ac.ui.cs.advprog.mysawitbe: ${LOG_LEVEL:INFO}
    org.springframework.security: WARN
    org.flywaydb: INFO
