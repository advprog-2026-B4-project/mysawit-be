services:
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    environment:
      BACKEND_HOST_MAIN: ${BACKEND_HOST_MAIN:-mysawit-be-main}
      BACKEND_HOST_STAGING: ${BACKEND_HOST_STAGING:-mysawit-be-staging}
    entrypoint:
      - /bin/sh
      - -c
      - |
        MAIN=$${BACKEND_HOST_MAIN:-mysawit-be-main}
        STAGING=$${BACKEND_HOST_STAGING:-mysawit-be-staging}
        cat > /tmp/prometheus.yml << YMLEOF
        global:
          scrape_interval: 15s
          evaluation_interval: 15s
          external_labels:
            monitor: mysawit-prod

        rule_files:
          - /etc/prometheus/alert_rules.yml

        scrape_configs:
          - job_name: mysawit-be-main
            metrics_path: /actuator/prometheus
            scrape_interval: 15s
            static_configs:
              - targets: ['$${MAIN}:9090']
                labels:
                  app: mysawit-be
                  env: main
            relabel_configs:
              - source_labels: [__address__]
                target_label: instance
                replacement: mysawit-main

          - job_name: mysawit-be-staging
            metrics_path: /actuator/prometheus
            scrape_interval: 15s
            static_configs:
              - targets: ['$${STAGING}:9090']
                labels:
                  app: mysawit-be
                  env: staging
            relabel_configs:
              - source_labels: [__address__]
                target_label: instance
                replacement: mysawit-staging

          - job_name: prometheus
            static_configs:
              - targets: ['localhost:9090']
        YMLEOF
        echo "=== Config ===" && cat /tmp/prometheus.yml
        exec /bin/prometheus \
          --config.file=/tmp/prometheus.yml \
          --storage.tsdb.path=/prometheus \
          --storage.tsdb.retention.time=30d \
          --web.enable-lifecycle
    volumes:
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - coolify
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── alertmanager disabled until Discord webhooks configured ───────────────
  #  alertmanager:
  #    ...

  # ── loki + alloy disabled until bind mount issue resolved ─────────────────
  #  loki:
  #    ...
  #  alloy:
  #    ...

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000"
    networks:
      - coolify
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  prometheus_data:
  grafana_data:

networks:
  coolify:
    external: true
