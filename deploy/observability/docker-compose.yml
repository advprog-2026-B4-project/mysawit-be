services:
  prometheus:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      BACKEND_HOST_MAIN: ${BACKEND_HOST_MAIN:-mysawit-be-main}
      BACKEND_HOST_STAGING: ${BACKEND_HOST_STAGING:-mysawit-be-staging}
    volumes:
      - prometheus_data:/prometheus
    networks:
      - coolify

  # ── alertmanager disabled until Discord webhooks configured ───────────────
  #  alertmanager:
  #    ...

  loki:
    build:
      context: .
      dockerfile: Dockerfile.loki
    restart: unless-stopped
    volumes:
      - loki_data:/loki
    networks:
      - coolify

  alloy:
    build:
      context: .
      dockerfile: Dockerfile.alloy
    restart: unless-stopped
    volumes:
      - app_logs:/var/log/mysawit:ro
      - alloy_data:/var/lib/alloy/data
    networks:
      - coolify
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000"
    networks:
      - coolify
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_started

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
  alloy_data:
  app_logs:

networks:
  coolify:
    external: true
